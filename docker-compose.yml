services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clairvoyant
      POSTGRES_PASSWORD: clairvoyant
      POSTGRES_DB: clairvoyant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clairvoyant"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clairvoyant:clairvoyant@db:5432/clairvoyant
      SECRET_KEY: dev-secret-key-change-in-production
      DEMO_EMAIL: demo@videosearch.io
      DEMO_PASSWORD: demo123
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
